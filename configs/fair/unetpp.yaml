experiment:
  output_root: outputs_fair
  name: unetpp
data:
  root: data
  image_size: 352
  batch_size: 6
  num_workers: 4
  pin_memory: true
  augmentation: strong
train:
  epochs: 120
  lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  t_max: 30
  eta_min: 1.0e-06
  mixed_precision: true
  grad_clip: 1.0
  seed: 42
  loss: bce_dice
  threshold: 0.5
  aux_loss_weight: 0.0
  aux_warmup_epochs: 0
  aux_ramp_epochs: 0
  save_metric: dice
  save_metric_mode: max
eval:
  loss: bce_dice
  threshold: 0.5
  device: null
model:
  name: unetpp
  in_channels: 3
  num_classes: 1
  channels:
  - 32
  - 64
  - 128
  - 256
  - 512
  deep_supervision: false
  norm: bn
  act: relu
