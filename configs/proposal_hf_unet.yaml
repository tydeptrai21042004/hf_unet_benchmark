experiment:
  output_root: outputs
  name: proposal_hf_unet

data:
  root: data
  image_size: 352
  batch_size: 6
  num_workers: 4
  pin_memory: true

train:
  epochs: 30
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  t_max: 30
  eta_min: 1.0e-6
  mixed_precision: true
  grad_clip: null
  seed: 42
  loss: bce_dice
  threshold: 0.5
  aux_loss_weight: 0.1
  save_metric: dice
  save_metric_mode: max

eval:
  loss: bce_dice
  threshold: 0.5
  device: null

model:
  name: proposal_hf_unet
  in_channels: 3
  num_classes: 1
  channels: [32, 64, 128, 256, 512]
  hf_alpha: 0.5
  hf_expansion: 1.5
  hf_dropout: 0.0
  use_hf_regularizer: true
  norm: bn
  act: relu
