data:
  root: data
  image_size: 352
  batch_size: 8
  num_workers: 4
  pin_memory: true
  augmentation: baseline
train:
  epochs: 30
  lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  t_max: 30
  eta_min: 1.0e-06
  mixed_precision: false
  grad_clip: 1.0
  seed: 42
  deterministic: true
  deterministic_warn_only: true
  loss: bce_dice
  threshold: 0.5
  aux_loss_weight: 0.0
  aux_warmup_epochs: 0
  aux_ramp_epochs: 0
eval:
  loss: bce_dice
  threshold: 0.5
  device: null
experiment:
  name: hsnet
  output_root: outputs
model:
  name: hsnet
  in_channels: 3
  num_classes: 1
  channels:
  - 32
  - 64
  - 128
  - 256
  - 512
  transformer_channels:
  - 32
  - 64
  - 128
  - 256
  decoder_channels: 64
  faithful_output: false
  norm: bn
  act: relu
