data:
  augmentation: strong
  batch_size: 6
  image_size: 352
  num_workers: 4
  pin_memory: true
  root: data
eval:
  device: null
  loss: structure
  threshold: 0.5
experiment:
  output_root: outputs_faithful
  name: polyp_pvt
train:
  aux_loss_weight: 0.0
  aux_ramp_epochs: 0
  aux_warmup_epochs: 0
  aux_loss: structure
  aux_output_weights: [1.0]
  epochs: 30
  eta_min: 1.0e-06
  grad_clip: 1.0
  loss: structure
  lr: 0.0003
  mixed_precision: false
  optimizer: adamw
  save_metric: dice
  save_metric_mode: max
  scheduler: cosine
  seed: 42
  t_max: 120
  threshold: 0.5
  weight_decay: 0.0001
model:
  name: polyp_pvt
  in_channels: 3
  num_classes: 1
  channels: [32, 64, 128, 256]
  faithful_output: true
  norm: bn
  act: gelu
