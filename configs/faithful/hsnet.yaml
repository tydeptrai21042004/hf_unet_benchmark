data:
  augmentation: strong
  batch_size: 6
  image_size: 352
  num_workers: 4
  pin_memory: true
  root: data
eval:
  device: null
  loss: bce_dice
  threshold: 0.5
experiment:
  output_root: outputs_faithful
  name: hsnet
train:
  aux_loss_weight: 1.0
  aux_output_weights:
  - 0.4
  - 0.6
  - 0.8
  - 1.0
  aux_ramp_epochs: 0
  aux_warmup_epochs: 0
  epochs: 30
  eta_min: 1.0e-06
  grad_clip: 1.0
  loss: bce_dice
  lr: 0.0003
  mixed_precision: false
  deterministic: true
  deterministic_warn_only: true
  optimizer: adamw
  save_metric: dice
  save_metric_mode: max
  scheduler: cosine
  seed: 42
  t_max: 30
  threshold: 0.5
  weight_decay: 0.0001
model:
  name: hsnet
  in_channels: 3
  num_classes: 1
  channels:
  - 32
  - 64
  - 128
  - 256
  - 512
  transformer_channels:
  - 32
  - 64
  - 128
  - 256
  decoder_channels: 64
  faithful_output: true
  norm: bn
  act: relu
