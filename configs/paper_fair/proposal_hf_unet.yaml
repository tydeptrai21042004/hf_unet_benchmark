data:
  augmentation: strong
  batch_size: 6
  image_size: 352
  num_workers: 4
  pin_memory: true
  root: data

eval:
  device: null
  loss: bce_dice
  threshold: 0.5

experiment:
  output_root: outputs_paper_fair
  name: proposal_hf_unet

train:
  aux_loss_weight: 0.01
  aux_ramp_epochs: 10
  aux_warmup_epochs: 5
  epochs: 30
  eta_min: 1.0e-06
  grad_clip: 1.0
  loss: bce_dice
  lr: 0.0003
  mixed_precision: false
  deterministic: true
  deterministic_warn_only: true
  optimizer: adamw
  save_metric: dice
  save_metric_mode: max
  scheduler: cosine
  seed: 42
  t_max: 30
  threshold: 0.5
  weight_decay: 0.0001

model:
  name: proposal_hf_unet
  in_channels: 3
  num_classes: 1

  channels:
    - 32
    - 64
    - 128
    - 256
    - 512

  hf_alpha: 0.5
  hf_alpha_start: 0.0
  hf_alpha_warmup_epochs: 10

  hf_expansion: 1.5
  hf_dropout: 0.1

  # Enable because the paper reports the HF block as a stability-aware
  # spectral bottleneck.
  use_hf_regularizer: true

  norm: bn
  act: relu

  hf_block_norm: gn
  hf_block_act: gelu

  # Keep this identity if you want the paper-faithful linear HF core.
  mixer_act: identity

  # Paper-faithful options:
  #   identity = closest to theory
  #   linear   = practical 1x1 channel projection
  #   conv     = old 3x3 empirical projection
  hf_projection: linear

  # For 352x352 input with 5 encoder stages, bottleneck is typically 22x22.
  hf_mixer_init_hw:
    - 22
    - 22

  # null means rank = max(int(channels * hf_expansion), channels).
  hf_mixer_rank: null

  use_se: false
  use_gate: true
  gate_init_bias: -2.0
  decoder_use_cbam: false
  identity_init: true
